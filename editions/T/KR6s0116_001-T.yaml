body:
  text: 日本國求法僧圓珍目錄於福府開元寺求得經論疏記等總計一百五十六卷法鏡經大乘方等要慧經一卷大乘金剛髻珠菩薩修行分一卷大方廣普賢所說經一卷八定不定印經一卷不空羂索陀羅尼經一卷最妙勝定經一卷妙法蓮華經論一卷勒那譯顯揚聖教論頌一卷無相論二卷上下因明正理門論一卷義淨譯大乘廣五蘊論一卷大周群經目錄二卷上下華嚴法海二卷上下八識三身圖卷道進鈔六卷法華科文二卷嘉祥淨名經關中疏略數義圖一卷金師子觀門一卷四分律音訓一卷和上變像一鋪福州開元寺新造浮屠碑并敘一卷於開元寺造淨土寫一切經竝藏碣銘并序一卷監軍使再修經藏院記一卷已上寫得中天竺大那蘭陀寺貝多葉梵字真言一夾梵字無礙大悲心陀羅尼一夾已上婆羅門三藏阿娑阿哩耶曼蘇悉怛羅捨授觀世音菩薩像一卷菩薩戒疏二卷上下阿彌陀經疏一卷淨名經疏三卷上中下般若心經疏一卷華嚴經疏二十卷法華玄贊十卷法華經疏十卷涅槃經疏十卷開四分律宗記十卷弘調伏錄八卷開四分律宗記鏡十卷四分律科文一卷四分開宗紀八卷城都抄一卷雜轉降句一卷四分比丘尼隨要行儀二卷俱舍論頌疏十二卷兩部俱舍論疏記五卷俱舍論釋頌疏抄三卷俱舍序記一卷已上沙門常砧存式惠灌智海義雄參寥履權等捨施相送詩一卷參寥月二十一日承州判住開元寺以前法門且隨求得記錄如件巨唐大中七年九月二十一日本求法僧圓珍記
